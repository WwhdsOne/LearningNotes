<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" viewBox="0 0 950 700" font-family="Segoe UI, system-ui, sans-serif" font-size="13">

  <defs>
    <marker id="arrow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#4a5568"/>
    </marker>
    <marker id="arrow-green" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#38a169"/>
    </marker>
    <marker id="arrow-yellow" markerWidth="10" markerHeight="7" refX="10" refY="3.5" orient="auto">
      <polygon points="0 0, 10 3.5, 0 7" fill="#d69e2e"/>
    </marker>
  </defs>

  <!-- Title -->
  <text x="475" y="30" text-anchor="middle" font-size="16" font-weight="bold" fill="#2d3748">Attentive Statistics Pooling — Architecture</text>

  <!-- ════════ Input Layer ════════ -->
  <rect x="60" y="60" width="200" height="50" rx="8" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
  <text x="160" y="83" text-anchor="middle" font-size="14" font-weight="600" fill="#2b6cb0">Acoustic Features</text>
  <text x="160" y="100" text-anchor="middle" font-size="11" fill="#4a5568">MFCC (20/40-dim) · 10ms frame rate</text>
  <line x1="260" y1="85" x2="320" y2="85" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ════════ TDNN Block ════════ -->
  <rect x="320" y="50" width="220" height="70" rx="8" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
  <text x="430" y="73" text-anchor="middle" font-size="14" font-weight="600" fill="#2b6cb0">TDNN × 5 Layers</text>
  <text x="430" y="90" text-anchor="middle" font-size="11" fill="#4a5568">512 nodes/layer · ReLU + BN</text>
  <text x="430" y="107" text-anchor="middle" font-size="11" fill="#718096">Output: 1500-dim frame-level feat. hₜ</text>

  <!-- Arrow split: TDNN → Attention (top) and TDNN → mean/std (bottom) -->
  <line x1="540" y1="70" x2="590" y2="70" stroke="#d69e2e" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>
  <line x1="540" y1="100" x2="590" y2="100" stroke="#38a169" stroke-width="1.5" marker-end="url(#arrow-green)"/>

  <!-- ════════ ASP Layer (dashed box) ════════ -->
  <rect x="570" y="35" width="355" height="290" rx="12" fill="none" stroke="#a0aec0" stroke-width="1" stroke-dasharray="6,3"/>
  <text x="580" y="50" font-size="12" fill="#718096" font-style="italic">Attentive Statistics Pooling (ASP) Layer</text>

  <!-- Attention Network box -->
  <rect x="590" y="55" width="160" height="40" rx="8" fill="#fefcbf" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="670" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#744210">Attention Network</text>
  <text x="670" y="88" text-anchor="middle" font-size="11" fill="#4a5568">FC(64, ReLU+BN) → scalar score eₜ</text>

  <!-- Label "h_t" on bottom arrow into attention -->
  <text x="555" y="97" font-size="11" fill="#38a169">hₜ</text>

  <!-- Attention → Softmax arrow -->
  <line x1="750" y1="75" x2="790" y2="75" stroke="#d69e2e" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- Softmax box -->
  <rect x="790" y="55" width="120" height="40" rx="8" fill="#fefcbf" stroke="#d69e2e" stroke-width="1.5"/>
  <text x="850" y="72" text-anchor="middle" font-size="13" font-weight="600" fill="#744210">Softmax</text>
  <image x="810" y="78" width="180" height="16" xlink:href="data:image/svg+xml;base64,' + formulas_b64["softmax"] + '"/>

  <!-- Softmax → Weighted Mean & Weighted Std -->
  <!-- Down from softmax -->
  <line x1="850" y1="95" x2="850" y2="140" stroke="#d69e2e" stroke-width="1.5"/>
  <line x1="850" y1="140" x2="740" y2="140" stroke="#d69e2e" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>
  <line x1="850" y1="95" x2="850" y2="200" stroke="#d69e2e" stroke-width="1.5"/>
  <line x1="850" y1="200" x2="740" y2="200" stroke="#d69e2e" stroke-width="1.5" marker-end="url(#arrow-yellow)"/>

  <!-- Weighted Mean box -->
  <rect x="590" y="120" width="150" height="40" rx="8" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5"/>
  <text x="665" y="137" text-anchor="middle" font-size="13" font-weight="600" fill="#22543d">Weighted Mean</text>
  <image x="595" y="142" width="140" height="16" xlink:href="data:image/svg+xml;base64,' + formulas_b64["eq_weighted_mean"] + '"/>

  <!-- Weighted Std box -->
  <rect x="590" y="180" width="150" height="40" rx="8" fill="#c6f6d5" stroke="#38a169" stroke-width="1.5"/>
  <text x="665" y="197" text-anchor="middle" font-size="13" font-weight="600" fill="#22543d">Weighted Std</text>
  <image x="592" y="202" width="146" height="16" xlink:href="data:image/svg+xml;base64,' + formulas_b64["eq_weighted_std"] + '"/>

  <!-- Direct h_t → mean/std (bottom path) -->
  <text x="555" y="137" font-size="11" fill="#38a169">hₜ</text>
  <text x="555" y="197" font-size="11" fill="#38a169">hₜ</text>

  <!-- Concat box -->
  <line x1="665" y1="220" x2="665" y2="250" stroke="#805ad5" stroke-width="1.5" marker-end="url(#arrow)"/>
  <rect x="590" y="250" width="150" height="40" rx="8" fill="#e9d8fd" stroke="#805ad5" stroke-width="1.5"/>
  <text x="665" y="267" text-anchor="middle" font-size="13" font-weight="600" fill="#44337a">Concat</text>
  <text x="665" y="284" text-anchor="middle" font-size="11" fill="#4a5568">[μ̃ ; σ̃] → 3000-dim</text>

  <!-- Concat → FC -->
  <line x1="740" y1="270" x2="790" y2="270" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- ════════ Utterance-level ════════ -->
  <rect x="790" y="240" width="140" height="60" rx="8" fill="#ebf8ff" stroke="#3182ce" stroke-width="1.5"/>
  <text x="860" y="263" text-anchor="middle" font-size="13" font-weight="600" fill="#2b6cb0">FC × 2 + Softmax</text>
  <text x="860" y="280" text-anchor="middle" font-size="11" fill="#4a5568">512-dim bottleneck</text>
  <text x="860" y="295" text-anchor="middle" font-size="11" fill="#718096">→ speaker embedding</text>

  <!-- FC → PLDA -->
  <line x1="860" y1="300" x2="860" y2="340" stroke="#4a5568" stroke-width="1.5" marker-end="url(#arrow)"/>

  <!-- PLDA box -->
  <rect x="790" y="340" width="140" height="35" rx="8" fill="#fff5f5" stroke="#e53e3e" stroke-width="1.5"/>
  <text x="860" y="362" text-anchor="middle" font-size="13" font-weight="600" fill="#c53030">PLDA Scoring</text>

  <!-- Side notes -->
  <!-- Data rep: α_t formula note -->
  <image x="62" y="140" width="130" height="16" xlink:href="data:image/svg+xml;base64,' + formulas_b64["alpha_t"] + '"/>

  <!-- Sidebar: Data augmentation -->
  <text x="90" y="175" font-size="11" fill="#718096" font-style="italic">Data augmentation:</text>
  <text x="90" y="190" font-size="11" fill="#718096" font-style="italic">Noise · Reverb · AMR coding</text>

  <!-- Sidebar: variable-length -->
  <text x="90" y="220" font-size="11" fill="#718096" font-style="italic">Variable-length input</text>
  <text x="90" y="235" font-size="11" fill="#718096" font-style="italic">→ fixed-length embedding</text>

  <!-- Sidebar: mu_tilde / sigma_tilde definitions -->
  <image x="62" y="260" width="100" height="16" xlink:href="data:image/svg+xml;base64,' + formulas_b64["mu_tilde"] + '"/>
  <image x="62" y="280" width="120" height="16" xlink:href="data:image/svg+xml;base64,' + formulas_b64["sigma_tilde"] + '"/>
  <text x="90" y="300" font-size="11" fill="#4a5568">= attention-weighted statistics</text>

</svg>