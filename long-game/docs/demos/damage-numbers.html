<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>伤害数字动画效果对比</title>
<style>
  :root {
    --bg: #0f172a;
    --surface: #1e293b;
    --text: #e2e8f0;
    --muted: #94a3b8;
    --accent: #facc15;
    --crit: #ef4444;
    --purple: #c084fc;
    --gold: #fde047;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
    padding: 24px;
    background-image:
      radial-gradient(ellipse at 50% 0%, rgba(99, 102, 241, 0.08), transparent 50%),
      radial-gradient(ellipse at 80% 100%, rgba(168, 85, 247, 0.06), transparent 40%);
  }

  h1 {
    font-size: 1.6rem;
    font-weight: 800;
    letter-spacing: 0.02em;
    margin-bottom: 8px;
    background: linear-gradient(135deg, #e2e8f0, #94a3b8);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }

  .subtitle {
    font-size: 0.8rem;
    color: var(--muted);
    margin-bottom: 28px;
  }

  .demo-grid {
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    gap: 20px;
    max-width: 900px;
    width: 100%;
  }

  @media (max-width: 700px) {
    .demo-grid { grid-template-columns: 1fr; }
  }

  .demo-card {
    background: var(--surface);
    border-radius: 16px;
    padding: 20px;
    border: 1px solid rgba(148, 163, 184, 0.1);
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 16px;
  }

  .demo-card__label {
    font-size: 0.75rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--muted);
  }

  .demo-card__label span {
    display: block;
    font-size: 0.62rem;
    font-weight: 500;
    color: #64748b;
    margin-top: 2px;
  }

  /* Shared cell style */
  .cell {
    position: relative;
    width: 160px;
    height: 160px;
    border-radius: 14px;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 0.85rem;
    font-weight: 700;
    color: var(--muted);
    background: rgba(15, 23, 42, 0.6);
    border: 2px solid rgba(148, 163, 184, 0.15);
    transition: border-color 0.2s, background 0.15s;
    overflow: hidden;
    user-select: none;
    -webkit-tap-highlight-color: transparent;
  }

  .cell:hover {
    border-color: rgba(148, 163, 184, 0.35);
    background: rgba(30, 41, 59, 0.7);
  }

  .cell:active {
    background: rgba(30, 41, 59, 0.9);
  }

  /* Damage burst base */
  .burst {
    position: absolute;
    left: 50%;
    top: 50%;
    font-weight: 900;
    line-height: 1;
    white-space: nowrap;
    pointer-events: none;
    z-index: 10;
    text-shadow: 0 4px 14px rgba(15, 23, 42, 0.7);
  }

  /* ===== Style A: Bounce & Scatter ===== */
  .burst--a {
    color: #facc15;
    font-size: 1.4rem;
    animation: bounceOut 1.4s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
    transform-origin: center;
  }

  .burst--a.crit {
    color: #f87171;
    font-size: 1.8rem;
    text-shadow: 0 0 18px rgba(248, 113, 113, 0.6), 0 4px 14px rgba(15, 23, 42, 0.7);
  }

  @keyframes bounceOut {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.2) rotate(-15deg);
    }
    15% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.3) rotate(3deg);
    }
    28% {
      transform: translate(calc(-50% + var(--sx, 12px)), calc(-50% + var(--sy, -56px))) scale(0.95) rotate(-2deg);
    }
    45% {
      transform: translate(calc(-50% + var(--sx, 12px)), calc(-50% + var(--sy, -72px))) scale(1.05) rotate(1deg);
    }
    70% {
      opacity: 0.9;
      transform: translate(calc(-50% + var(--sx, 12px)), calc(-50% + var(--sy, -80px))) scale(1) rotate(0deg);
    }
    100% {
      opacity: 0;
      transform: translate(calc(-50% + var(--sx, 12px)), calc(-50% + var(--sy, -100px))) scale(0.8) rotate(2deg);
    }
  }

  /* Trailing ghost for Style A */
  .burst-ghost {
    position: absolute;
    left: 50%;
    top: 50%;
    font-weight: 900;
    line-height: 1;
    white-space: nowrap;
    pointer-events: none;
    z-index: 9;
    color: #facc15;
    font-size: 1.2rem;
    opacity: 0.25;
    animation: ghostTrail 0.7s ease-out forwards;
    text-shadow: 0 0 20px rgba(250, 204, 21, 0.4);
  }

  @keyframes ghostTrail {
    0% {
      opacity: 0.35;
      transform: translate(-50%, -50%) scale(1.1);
    }
    100% {
      opacity: 0;
      transform: translate(calc(-50% + var(--gx, -20px)), calc(-50% + var(--gy, -60px))) scale(0.5);
    }
  }

  /* ===== Style B: Particle Burst ===== */
  .burst--b {
    color: #c084fc;
    font-size: 1.5rem;
    animation: burstRise 1.6s cubic-bezier(0.22, 1, 0.36, 1) forwards;
    text-shadow: 0 0 16px rgba(192, 132, 252, 0.6), 0 4px 14px rgba(15, 23, 42, 0.7);
  }

  .burst--b.crit {
    color: #fde047;
    font-size: 2rem;
    text-shadow: 0 0 24px rgba(253, 224, 71, 0.7), 0 6px 18px rgba(15, 23, 42, 0.7);
    -webkit-text-stroke: 1px rgba(239, 68, 68, 0.5);
  }

  @keyframes burstRise {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.3);
      filter: brightness(1);
    }
    12% {
      opacity: 1;
      transform: translate(-50%, calc(-50% - 12px)) scale(1.25);
      filter: brightness(1.6);
    }
    25% {
      transform: translate(-50%, calc(-50% - 30px)) scale(1);
      filter: brightness(1.3);
    }
    60% {
      opacity: 0.9;
      transform: translate(-50%, calc(-50% - 60px)) scale(1);
      filter: brightness(1);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, calc(-50% - 90px)) scale(0.9);
      filter: brightness(0.8);
    }
  }

  /* Particles for Style B */
  .particle {
    position: absolute;
    pointer-events: none;
    z-index: 8;
    border-radius: 50%;
    animation: particleFly 0.9s ease-out forwards;
  }

  @keyframes particleFly {
    0% {
      opacity: 0.9;
      transform: translate(0, 0) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(var(--px, 30px), var(--py, -50px)) scale(0);
    }
  }

  /* ===== Style C: Shockwave Ripple ===== */
  .burst--c {
    color: #f8fafc;
    font-size: 1.5rem;
    animation: shockRise 1.5s cubic-bezier(0.16, 1, 0.3, 1) forwards;
    text-shadow: 0 0 14px rgba(248, 250, 252, 0.5), 0 4px 16px rgba(15, 23, 42, 0.8);
  }

  .burst--c.crit {
    color: #fbbf24;
    font-size: 2rem;
    text-shadow: 0 0 20px rgba(251, 191, 36, 0.7), 0 6px 20px rgba(15, 23, 42, 0.8);
  }

  @keyframes shockRise {
    0% {
      opacity: 0;
      transform: translate(-50%, -50%) scale(0.5);
    }
    10% {
      opacity: 1;
      transform: translate(-50%, -50%) scale(1.1);
    }
    25% {
      transform: translate(-50%, calc(-50% - 20px)) scale(1);
    }
    60% {
      opacity: 0.85;
      transform: translate(-50%, calc(-50% - 55px)) scale(1);
    }
    100% {
      opacity: 0;
      transform: translate(-50%, calc(-50% - 85px)) scale(0.95);
    }
  }

  /* Ripple for Style C */
  .ripple {
    position: absolute;
    inset: 0;
    pointer-events: none;
    z-index: 7;
    border-radius: 14px;
    border: 3px solid rgba(248, 250, 252, 0.6);
    animation: rippleOut 0.7s ease-out forwards;
  }

  .ripple.crit {
    border-color: rgba(251, 191, 36, 0.8);
    box-shadow: 0 0 24px rgba(251, 191, 36, 0.3), inset 0 0 24px rgba(251, 191, 36, 0.1);
  }

  @keyframes rippleOut {
    0% {
      opacity: 0.9;
      transform: scale(0.85);
      border-width: 4px;
    }
    100% {
      opacity: 0;
      transform: scale(1.15);
      border-width: 1px;
    }
  }

  /* Click counter */
  .click-count {
    font-size: 0.7rem;
    color: #475569;
    margin-top: 4px;
  }

  /* Reset button */
  .reset-btn {
    margin-top: 28px;
    padding: 10px 28px;
    border: 1px solid rgba(148, 163, 184, 0.25);
    border-radius: 10px;
    background: rgba(148, 163, 184, 0.06);
    color: var(--muted);
    font-size: 0.8rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    background: rgba(148, 163, 184, 0.12);
    color: #e2e8f0;
    border-color: rgba(148, 163, 184, 0.4);
  }

  /* Legend */
  .legend {
    display: flex;
    gap: 16px;
    margin-top: 12px;
    flex-wrap: wrap;
    justify-content: center;
  }

  .legend-item {
    display: flex;
    align-items: center;
    gap: 6px;
    font-size: 0.65rem;
    color: #64748b;
  }

  .legend-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
  }
</style>
</head>
<body>

<h1>伤害数字动画效果对比</h1>
<p class="subtitle">点击格子触发伤害数字，三种风格对比</p>

<div class="demo-grid">
  <!-- Style A: Bounce & Scatter -->
  <div class="demo-card">
    <div class="demo-card__label">A · 弹性散射<span>Bounce + 拖尾残影 + 随机偏移</span></div>
    <div class="cell" id="cellA" data-style="a">
      点击攻击
      <div class="click-count" id="countA">伤害: 0</div>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#facc15"></span> 普通</span>
      <span class="legend-item"><span class="legend-dot" style="background:#f87171"></span> 暴击</span>
    </div>
  </div>

  <!-- Style B: Particle Burst -->
  <div class="demo-card">
    <div class="demo-card__label">B · 粒子爆炸<span>多彩粒子溅射 + 数字闪烁放大</span></div>
    <div class="cell" id="cellB" data-style="b">
      点击攻击
      <div class="click-count" id="countB">伤害: 0</div>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#c084fc"></span> 普通</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fde047"></span> 暴击</span>
    </div>
  </div>

  <!-- Style C: Shockwave Ripple -->
  <div class="demo-card">
    <div class="demo-card__label">C · 冲击波<span>扩散波纹 + 数值匀速上升</span></div>
    <div class="cell" id="cellC" data-style="c">
      点击攻击
      <div class="click-count" id="countC">伤害: 0</div>
    </div>
    <div class="legend">
      <span class="legend-item"><span class="legend-dot" style="background:#f8fafc"></span> 普通</span>
      <span class="legend-item"><span class="legend-dot" style="background:#fbbf24"></span> 暴击</span>
    </div>
  </div>
</div>

<button class="reset-btn" onclick="resetAll()">重置伤害计数</button>

<script>
  const counters = { a: 0, b: 0, c: 0 };

  // Damage values pool for variety
  const damages = [
    { value: 42, crit: false },
    { value: 87, crit: false },
    { value: 156, crit: false },
    { value: 28, crit: false },
    { value: 315, crit: true },
    { value: 204, crit: true },
    { value: 99, crit: false },
    { value: 520, crit: true },
    { value: 73, crit: false },
    { value: 188, crit: false },
  ];
  let damageIdx = 0;

  document.querySelectorAll('.cell').forEach(cell => {
    cell.addEventListener('click', () => {
      const style = cell.dataset.style;
      const dmg = damages[damageIdx % damages.length];
      damageIdx++;
      spawnDamage(style, cell, dmg);
    });
  });

  function spawnDamage(style, cell, dmg) {
    const isCrit = dmg.crit;
    const value = dmg.value + Math.floor(Math.random() * 30);
    const countKey = style;
    counters[countKey] += value;
    document.getElementById(`count${style.toUpperCase()}`).textContent = `伤害: ${counters[countKey]}`;

    const el = document.createElement('span');

    if (style === 'a') {
      // === A: Bounce Scatter ===
      el.className = 'burst burst--a' + (isCrit ? ' crit' : '');
      el.textContent = isCrit ? `CRIT ${value}` : `${value}`;
      const sx = (Math.random() - 0.5) * 40;
      const sy = -(60 + Math.random() * 30);
      el.style.setProperty('--sx', sx + 'px');
      el.style.setProperty('--sy', sy + 'px');
      cell.appendChild(el);

      // Trailing ghost
      if (isCrit) {
        const ghost = document.createElement('span');
        ghost.className = 'burst-ghost';
        ghost.textContent = value;
        ghost.style.setProperty('--gx', ((Math.random() - 0.5) * 50) + 'px');
        ghost.style.setProperty('--gy', '(-50 + Math.random() * 20)' + 'px');
        cell.appendChild(ghost);
        setTimeout(() => ghost.remove(), 750);
      }

      setTimeout(() => el.remove(), 1450);

    } else if (style === 'b') {
      // === B: Particle Burst ===
      el.className = 'burst burst--b' + (isCrit ? ' crit' : '');
      el.textContent = isCrit ? `CRIT ${value}` : `${value}`;
      cell.appendChild(el);

      // Spawn particles
      const particleColors = isCrit
        ? ['#fde047', '#fbbf24', '#f59e0b', '#ef4444', '#f87171', '#facc15']
        : ['#c084fc', '#a78bfa', '#8b5cf6', '#7c3aed', '#c4b5fd', '#ddd6fe'];

      for (let i = 0; i < (isCrit ? 16 : 10); i++) {
        const p = document.createElement('div');
        p.className = 'particle';
        const size = 2 + Math.random() * 4;
        p.style.width = size + 'px';
        p.style.height = size + 'px';
        p.style.background = particleColors[Math.floor(Math.random() * particleColors.length)];
        p.style.left = '50%';
        p.style.top = '50%';
        const angle = Math.random() * Math.PI * 2;
        const dist = 20 + Math.random() * 50;
        p.style.setProperty('--px', Math.cos(angle) * dist + 'px');
        p.style.setProperty('--py', Math.sin(angle) * dist + 'px');
        cell.appendChild(p);
        setTimeout(() => p.remove(), 950);
      }

      setTimeout(() => el.remove(), 1650);

    } else if (style === 'c') {
      // === C: Shockwave Ripple ===
      // Ripple first
      const ripple = document.createElement('div');
      ripple.className = 'ripple' + (isCrit ? ' crit' : '');
      cell.appendChild(ripple);

      // Then number
      el.className = 'burst burst--c' + (isCrit ? ' crit' : '');
      el.textContent = isCrit ? `CRIT ${value}` : `${value}`;
      cell.appendChild(el);

      setTimeout(() => ripple.remove(), 750);
      setTimeout(() => el.remove(), 1550);
    }
  }

  function resetAll() {
    ['a', 'b', 'c'].forEach(k => {
      counters[k] = 0;
      document.getElementById(`count${k.toUpperCase()}`).textContent = '伤害: 0';
    });
    document.querySelectorAll('.burst, .burst-ghost, .particle, .ripple').forEach(el => el.remove());
  }
</script>

</body>
</html>
