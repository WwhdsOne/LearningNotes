<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>像素剑光标 — Boss 战斗 Demo</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body {
    background: #0f172a;
    color: #e2e8f0;
    font-family: 'DM Sans', 'PingFang SC', sans-serif;
    padding: 32px;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    align-items: center;
  }
  h1 { font-size: 1.5rem; margin-bottom: 8px; }
  .subtitle { color: #94a3b8; margin-bottom: 20px; font-size: 0.9rem; }

  /* 图例 */
  .legend { display:flex; gap:16px; flex-wrap:wrap; margin-bottom:24px; font-size:0.75rem; }
  .legend span { padding:2px 8px; border-radius:4px; }
  .legend .lg-soft { background:#334155; color:#e2e8f0; }
  .legend .lg-heavy { background:#334155; color:#9ca3af; }
  .legend .lg-weak { background:#422006; color:#fcd34d; }

  /* Boss 战斗区域 */
  .boss-grid-wrapper {
    cursor: none;
    position: relative;
    will-change: transform;
    padding: 12px;
    border-radius: 14px;
    /* 中心聚焦渐变 */
    background: radial-gradient(ellipse at center, rgba(99,102,241,0.18) 0%, rgba(30,41,59,0.85) 65%, rgba(15,23,42,0.95) 100%);
    box-shadow: 0 0 60px rgba(99,102,241,0.08), inset 0 0 30px rgba(0,0,0,0.2);
  }
  .boss-grid {
    display: grid;
    grid-template-columns: repeat(5, 1fr);
    gap: 4px;
    width: 470px;
  }
  .boss-cell {
    aspect-ratio: 1;
    border: 2px solid rgba(71,85,105,0.5);
    border-radius: 6px;
    background: rgba(30,41,59,0.7);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    padding: 4px;
    color: #e2e8f0;
    font-size: 0.75rem;
    cursor: none;
    transition: all 0.2s ease;
    position: relative;
    user-select: none;
    touch-action: manipulation;
    /* 默认稍低存在感 */
    opacity: 0.75;
    filter: brightness(0.85);
    transform: scale(0.98);
  }
  /* 中心格子呼吸 */
  .boss-cell.center-cell {
    border-color: rgba(34,197,94,0.7);
    box-shadow: 0 0 12px rgba(34,197,94,0.45), 0 0 30px rgba(34,197,94,0.15);
    animation: center-breathe 1.3s ease-in-out infinite alternate;
    opacity: 1;
    filter: brightness(1);
    transform: scale(1);
    z-index: 2;
  }
  @keyframes center-breathe {
    0%   { box-shadow: 0 0 8px rgba(34,197,94,0.35), 0 0 22px rgba(34,197,94,0.1); border-color: rgba(34,197,94,0.5); }
    100% { box-shadow: 0 0 18px rgba(34,197,94,0.6), 0 0 38px rgba(34,197,94,0.22); border-color: rgba(34,197,94,0.9); }
  }
  /* hover 爆发 */
  .boss-cell:hover {
    opacity: 1;
    filter: brightness(1.15);
    transform: scale(1.04);
    border-color: rgba(148,163,184,0.8);
    background: rgba(40,52,72,0.9);
    z-index: 3;
  }
  /* 弱点/暴击格子带微弱金色脉动 */
  .boss-cell.priority-cell {
    border-color: rgba(251,191,36,0.35);
    box-shadow: 0 0 6px rgba(251,191,36,0.15);
    opacity: 0.85;
    filter: brightness(0.9);
  }
  .boss-cell.priority-cell:hover {
    border-color: rgba(251,191,36,0.8);
    box-shadow: 0 0 16px rgba(251,191,36,0.3);
    opacity: 1;
    filter: brightness(1.2);
  }
  .boss-cell:active {
    background: rgba(20,30,44,0.95);
    transform: scale(0.96);
    transition: all 0.05s;
  }
  .boss-cell .cell-type { font-size: 0.65rem; color: #94a3b8; }
  .boss-cell .cell-hp { font-size: 0.6rem; color: #64748b; }

  /* 命中闪光（在格子上短暂亮起） */
  .boss-cell.hit-flash {
    animation: hit-flash 0.25s ease-out;
  }
  @keyframes hit-flash {
    0%   { background: rgba(255,255,255,0.25); box-shadow: 0 0 20px rgba(255,255,255,0.3); }
    100% { background: rgba(30,41,59,0.7); }
  }

  /* 连击计数器 */
  .combo-display {
    position: absolute;
    top: -36px;
    left: 50%;
    transform: translateX(-50%);
    font-family: 'SFMono-Regular', monospace;
    font-weight: 900;
    color: #fbbf24;
    text-shadow: 0 0 8px rgba(251,191,36,0.4);
    pointer-events: none;
    z-index: 10;
    opacity: 0;
    transition: all 0.3s ease;
  }
  .combo-display.active {
    opacity: 1;
    font-size: 1.6rem;
    animation: combo-pop 0.25s ease;
  }
  .combo-display.mega {
    color: #ef4444;
    font-size: 2.2rem;
    text-shadow: 0 0 16px rgba(239,68,68,0.6);
    animation: combo-pop-big 0.2s ease;
  }
  @keyframes combo-pop {
    0%   { transform: translateX(-50%) scale(0.5); }
    60%  { transform: translateX(-50%) scale(1.3); }
    100% { transform: translateX(-50%) scale(1); }
  }
  @keyframes combo-pop-big {
    0%   { transform: translateX(-50%) scale(0.3); }
    50%  { transform: translateX(-50%) scale(1.6); }
    100% { transform: translateX(-50%) scale(1); }
  }

    animation: dmg-float 1s ease-out forwards;

  .dmg-number.dmg--heavy   { color: #b0b0c0; font-size: 0.9rem; }
  .dmg-number.dmg--weak    { color: #fcd34d; font-size: 1.8rem; text-shadow: -1px -1px 0 #ef4444, 1px -1px 0 #ef4444, -1px 1px 0 #ef4444, 1px 1px 0 #ef4444; }

  .dmg-number.dmg--true    { color: #a78bfa; font-size: 1.1rem; text-shadow: 0 0 4px rgba(139,92,246,0.4); }
  .dmg-number.dmg--maxhp   { color: #7c3aed; font-size: 2.6rem; text-shadow: 0 0 14px #7c3aed, 0 0 28px rgba(124,58,237,0.5); }
  .dmg-number.dmg--ultra   { color: #fef3c7; font-size: 3.5rem; text-shadow: 0 0 16px #f59e0b, 0 0 36px #fbbf24, 0 0 60px rgba(251,191,36,0.4); }
  .dmg-number .dmg-label { display:block; font-size:0.55em; letter-spacing:0.15em; }

  @keyframes dmg-float {
    0%   { opacity:1; transform:translateY(0) scale(0.6); }
    15%  { opacity:1; transform:translateY(-6px) scale(1.15); }
    40%  { opacity:1; transform:translateY(-18px) scale(1); }
    100% { opacity:0; transform:translateY(-42px) scale(0.9); }
  }

  /* 屏幕震动 */
  .boss-grid-wrapper.shake { animation: screen-shake 0.12s ease-out; }
  .boss-grid-wrapper.shake--hard { animation: screen-shake-hard 0.18s ease-out; }

  /* 全屏闪光 */
  .screen-flash {
    position:fixed;inset:0;pointer-events:none;z-index:9996;
    animation: flash-burst 0.5s ease-out forwards;
  }
  @keyframes flash-burst {
    0% { background:rgba(251,191,36,0.4); }
    100% { background:transparent; }
  }
  .screen-flash--purple { animation-name:flash-purple; }
  @keyframes flash-purple {
    0% { background:rgba(124,58,237,0.35); }
    100% { background:transparent; }
  }

  /* K.O. 暗角 */
  .vignette {
    position:fixed;inset:0;pointer-events:none;z-index:9995;
    background:radial-gradient(ellipse at center, transparent 40%, rgba(0,0,0,0.7) 100%);
    animation: vignette-in 0.6s ease-out forwards;
  }
  @keyframes vignette-in {
    0% { opacity:0; }
    30% { opacity:1; }
    100% { opacity:0; }
  }
  @keyframes screen-shake {
    0%,100% { transform:translate(0); }
    20% { transform:translate(-3px, 1px); }
    40% { transform:translate(2px, -2px); }
    60% { transform:translate(-1px, -1px); }
    80% { transform:translate(2px, 1px); }
  }
  @keyframes screen-shake-hard {
    0%,100% { transform:translate(0); }
    15% { transform:translate(-6px, 2px); }
    30% { transform:translate(4px, -3px); }
    45% { transform:translate(-3px, -2px); }
    60% { transform:translate(5px, 1px); }
    75% { transform:translate(-2px, -1px); }
    90% { transform:translate(3px, 2px); }
  }

  /* 挥剑粒子 */
  .sword-particle {
    position: fixed;
    pointer-events: none;
    z-index: 9998;
    width: 4px;
    height: 4px;
    image-rendering: pixelated;
    transition: none;
  }

<body>
<h1>像素剑光标 — Boss 战斗 Demo</h1>
<p class="subtitle">移入格子 → 剑光标 · 点击 → 挥剑60° + 粒子 + 飘字 + 震屏</p>

<div class="legend">
  <span class="lg-soft">软组织</span><span class="lg-heavy">重甲</span><span class="lg-weak">弱点暴击</span>
  <span style="padding:2px 8px;border-radius:4px;background:#422006;color:#fbbf24;">暴击CRIT!</span>
  <span style="padding:2px 8px;border-radius:4px;background:#1e293b;color:#60a5fa;">追击</span>
  <span style="padding:2px 8px;border-radius:4px;background:#1e293b;color:#a78bfa;">⚡真伤</span>
  <span style="padding:2px 8px;border-radius:4px;background:#2e1065;color:#7c3aed;">💀削血</span>
  <span style="padding:2px 8px;border-radius:4px;background:#422006;color:#fcd34d;">K.O.终极暴击</span>
</div>

<div class="boss-grid-wrapper" id="boss-area">
  <div class="boss-grid" id="boss-grid"></div>
</div>

<div id="custom-cursor" style="display:none;"></div>

<p class="info">
  动画全部 mousedown 触发 · 中心格呼吸 · hover 爆发 · 命中白光 · 连击计数 xN
</p>

<script>
// 生成 5×5 Boss 格子 — 8 种伤害类型
const grid = document.getElementById('boss-grid');
const allTypes = ['soft','heavy','weak','crit','pursuit','trueDmg','maxHpCut','ultraCrit'];
const typeNames = {
  soft:'软组织', heavy:'重甲', weak:'弱点', crit:'暴击',
  pursuit:'追击', trueDmg:'真伤', maxHpCut:'削血', ultraCrit:'K.O.'
};
const priorityTypes = new Set(['weak','crit','ultraCrit']);
let comboCount = 0;
const bossArea = document.getElementById('boss-area');

// 连击显示器
const comboDisplay = document.createElement('div');
comboDisplay.className = 'combo-display';
bossArea.appendChild(comboDisplay);

for (let y = 0; y < 5; y++) {
  for (let x = 0; x < 5; x++) {
    const cell = document.createElement('button');
    cell.className = 'boss-cell';
    cell.setAttribute('type', 'button');
    const ti = (y * 5 + x) % allTypes.length;
    const t = allTypes[ti];
    cell.setAttribute('data-cell-type', t);
    // 中心格子呼吸
    if (x === 2 && y === 2) cell.classList.add('center-cell');
    // 高价值目标
    if (priorityTypes.has(t)) cell.classList.add('priority-cell');
    cell.innerHTML = `<span class="cell-type">${typeNames[t]}</span><span class="cell-hp">HP ${100 - (x+y)*3}%</span>`;
    grid.appendChild(cell);
  }
}

// 自定义光标
const cursor = document.getElementById('custom-cursor');
let cursorVisible = false;

function updateCursorPos(e) {
  cursor.style.left = e.clientX + 'px';
  cursor.style.top = e.clientY + 'px';
}

document.addEventListener('pointermove', (e) => {
  if (!cursorVisible) return;
  updateCursorPos(e);
});

bossArea.addEventListener('pointerenter', (e) => {
  cursor.style.display = 'block';
  cursorVisible = true;
  updateCursorPos(e);
});

bossArea.addEventListener('pointerleave', () => {
  cursor.style.display = 'none';
  cursorVisible = false;
});

// 部位类型 → 粒子配置
const PARTICLE_PRESETS = {
  soft: {
    colors: ['#e8e8f4','#fafaff','#d0d0dc','#ffffff'],
    count: 10, size: [3, 6], speed: [4, 8],
    angle: [Math.PI*0.15, Math.PI*0.55],
    gravity: 0.08, name: '普通'
  },
  heavy: {
    colors: ['#b0b0c0','#9090a0','#787888','#c8c8d8'],
    count: 8, size: [3, 5], speed: [3, 7],
    angle: [Math.PI*0.25, Math.PI*0.5],
    gravity: 0.18, name: '弹刃'
  },
  weak: {
    colors: ['#fcd34d','#fbbf24','#f59e0b','#ef4444','#fef3c7'],
    count: 18, size: [4, 9], speed: [6, 12],
    angle: [Math.PI*0.02, Math.PI*0.65],
    gravity: 0.04, name: '弱点暴击'
  },
  crit: {
    colors: ['#fcd34d','#fbbf24','#f59e0b','#fef3c7','#fde68a'],
    count: 14, size: [4, 7], speed: [5, 10],
    angle: [Math.PI*0.1, Math.PI*0.55],
    gravity: 0.06, name: '暴击'
  },
  pursuit: {
    colors: ['#60a5fa','#3b82f6','#93c5fd','#2563eb'],
    count: 7, size: [3, 5], speed: [3, 6],
    angle: [Math.PI*0.4, Math.PI*0.7], // 偏右下，与主伤害错开
    gravity: 0.12, name: '追击'
  },
  trueDmg: {
    colors: ['#a78bfa','#8b5cf6','#c4b5fd','#7c3aed'],
    count: 12, size: [3, 6], speed: [5, 9],
    angle: [Math.PI*0.1, Math.PI*0.6],
    gravity: 0.07, name: '真伤'
  },
  maxHpCut: {
    colors: ['#7c3aed','#6d28d9','#a78bfa','#8b5cf6','#ede9fe'],
    count: 24, size: [5, 12], speed: [8, 16],
    angle: [Math.PI*0.0, Math.PI*0.7],
    gravity: 0.03, name: '削血'
  },
  ultraCrit: {
    colors: ['#fef3c7','#fcd34d','#f59e0b','#fbbf24','#ffffff','#fde68a'],
    count: 30, size: [6, 14], speed: [10, 20],
    angle: [Math.PI*(-0.05), Math.PI*0.75],
    gravity: 0.02, name: '终极暴击'
  },
};

const particles = [];

function spawnParticles(cx, cy, cellType) {
  const preset = PARTICLE_PRESETS[cellType] || PARTICLE_PRESETS.soft;
  for (let i = 0; i < preset.count; i++) {
    const el = document.createElement('div');
    el.className = 'sword-particle';
    const angle = preset.angle[0] + Math.random() * (preset.angle[1] - preset.angle[0]);
    const speed = preset.speed[0] + Math.random() * (preset.speed[1] - preset.speed[0]);
    const size = preset.size[0] + Math.floor(Math.random() * (preset.size[1] - preset.size[0] + 1));
    el.style.width = size + 'px';
    el.style.height = size + 'px';
    el.style.background = preset.colors[Math.floor(Math.random() * preset.colors.length)];
    el.style.left = cx + 'px';
    el.style.top = cy + 'px';
    document.body.appendChild(el);
    particles.push({
      el, x: cx, y: cy,
      vx: Math.cos(angle) * speed,
      vy: Math.sin(angle) * speed,
      life: 1.0,
      decay: 0.015 + Math.random() * 0.035,
      gravity: preset.gravity,
    });
  }
}

function updateParticles() {
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.x += p.vx;
    p.y += p.vy;
    p.vy += p.gravity;
    p.life -= p.decay;
    p.el.style.left = p.x + 'px';
    p.el.style.top = p.y + 'px';
    p.el.style.opacity = p.life;
    if (p.life <= 0) {
      p.el.remove();
      particles.splice(i, 1);
    }
  }
  if (particles.length > 0) {
    requestAnimationFrame(updateParticles);
  }
}

// 伤害飘字配置
const DMG_PRESETS = {
  soft:     { cls:'dmg--soft',     label:'',        dmg:()=> 30 + Math.floor(Math.random()*60) },
  heavy:    { cls:'dmg--heavy',    label:'',        dmg:()=> 10 + Math.floor(Math.random()*25) },
  weak:     { cls:'dmg--weak',     label:'WEAK!',   dmg:()=> 200 + Math.floor(Math.random()*200), shake:'hard' },
  crit:     { cls:'dmg--crit',     label:'CRIT!',   dmg:()=> 80 + Math.floor(Math.random()*150), shake:true },
  pursuit:  { cls:'dmg--pursuit',  label:'',        dmg:()=> 20 + Math.floor(Math.random()*40) },
  trueDmg:  { cls:'dmg--true',     label:'⚡',  dmg:()=> 60 + Math.floor(Math.random()*80) },
  maxHpCut: { cls:'dmg--maxhp',    label:'💀', dmg:()=> 500 + Math.floor(Math.random()*500), shake:'hard' },
  ultraCrit:{ cls:'dmg--ultra',    label:'K.O.',    dmg:()=> 800 + Math.floor(Math.random()*400), shake:'hard' },
};

function spawnDmgNumber(cx, cy, cellType) {
  const preset = DMG_PRESETS[cellType] || DMG_PRESETS.soft;
  const el = document.createElement('div');
  el.className = 'dmg-number ' + preset.cls;
  const dmg = preset.dmg();
  const ox = (Math.random() - 0.5) * 40;
  el.style.left = (cx + ox) + 'px';
  el.style.top = (cy - 10) + 'px';
  if (preset.label) {
    el.innerHTML = `<span class="dmg-label">${preset.label}</span>- ${dmg}`;
  } else {
    el.textContent = `- ${dmg}`;
  }
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
  return { shake: preset.shake || null, flash: cellType === 'ultraCrit' ? 'gold' : cellType === 'maxHpCut' ? 'purple' : cellType === 'weak' ? 'gold' : null };
}

// 闪光效果
function triggerFlash(color) {
  const el = document.createElement('div');
  el.className = 'screen-flash' + (color === 'purple' ? ' screen-flash--purple' : '');
  document.body.appendChild(el);
  el.addEventListener('animationend', () => el.remove());
}

// 屏幕震动
let shakeTimer = 0;
function triggerShake(intensity) {
  clearTimeout(shakeTimer);
  const cls = intensity === 'hard' ? 'shake--hard' : 'shake';
  bossArea.classList.remove('shake', 'shake--hard');
  void bossArea.offsetWidth; // reflow
  bossArea.classList.add(cls);
  shakeTimer = setTimeout(() => bossArea.classList.remove('shake', 'shake--hard'), 200);
}

// === 攻击逻辑（抽成独立函数） ===
let lastAttackTime = 0;
let comboTimer = 0;
let recoverTimer = 0;
let swordSwung = false;

function doAttack(e) {
  const now = Date.now();
  if (now - lastAttackTime < 32) return; // 去重（仅挡 pointerdown+click 双事件）
  lastAttackTime = now;

  e.preventDefault();

  // 挥剑
  clearTimeout(recoverTimer);
  cursor.classList.remove('recovering');
  cursor.classList.add('swinging');
  swordSwung = true;

  // 最低保持 50ms（覆盖轻触，不拖连点）
  recoverTimer = setTimeout(() => {
    cursor.classList.remove('swinging');
    cursor.classList.add('recovering');
    swordSwung = false;
  }, 50);

  const cell = e.target.closest('.boss-cell');
  const cellType = cell ? cell.getAttribute('data-cell-type') : 'soft';

  if (cell) {
    cell.classList.remove('hit-flash');
    void cell.offsetWidth;
    cell.classList.add('hit-flash');
  }

  comboCount++;
  clearTimeout(comboTimer);
  comboDisplay.textContent = `x${comboCount}`;
  comboDisplay.className = 'combo-display' + (comboCount >= 10 ? ' mega' : '') + ' active';
  void comboDisplay.offsetWidth;
  comboDisplay.classList.add(comboCount >= 10 ? 'mega' : 'active');
  comboTimer = setTimeout(() => {
    comboCount = 0;
    comboDisplay.className = 'combo-display';
  }, 1500);

  spawnParticles(e.clientX, e.clientY, cellType);
  updateParticles();
  const result = spawnDmgNumber(e.clientX, e.clientY, cellType);
  if (result.shake) triggerShake(result.shake);
  if (result.flash) triggerFlash(result.flash);
  if (cellType === 'ultraCrit') {
    const v = document.createElement('div');
    v.className = 'vignette';
    document.body.appendChild(v);
    v.addEventListener('animationend', () => v.remove());
  }
}

bossArea.addEventListener('pointerdown', doAttack);
bossArea.addEventListener('click', doAttack);

// 物理按键松开时，如果 60ms 已过就复位，否则等定时器
bossArea.addEventListener('pointerup', () => {
  if (!swordSwung) {
    cursor.classList.remove('swinging');
    cursor.classList.add('recovering');
  }
});

bossArea.addEventListener('pointerleave', () => {
  clearTimeout(recoverTimer);
  cursor.classList.remove('swinging');
  cursor.classList.add('recovering');
  swordSwung = false;
});
</script>
</body>
